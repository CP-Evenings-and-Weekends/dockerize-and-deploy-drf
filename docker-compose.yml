services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      # CHANGE ME: match the NAME in your Django settings.py DATABASES block
      - POSTGRES_DB=wines
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
